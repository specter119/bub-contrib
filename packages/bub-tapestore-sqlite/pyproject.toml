[project]
name = "bub-tapestore-sqlite"
version = "0.1.0"
description = "SQLite tape store plugin for Bub"
readme = "README.md"
authors = [
    { name = "Chojan Shang", email = "psiace@apache.org" }
]
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.20.0",
    "any-llm-sdk",
    "bub>=0.3.0a1",
    "republic>=0.5.4",
    "sqlite-vec>=0.1.6",
]

[project.entry-points.bub]
tapestore-sqlite = "bub_tapestore_sqlite.plugin"

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"
