[project]
name = "bub-github-copilot"
version = "0.1.0"
description = "GitHub Copilot SDK-backed run_model plugin for Bub"
readme = "README.md"
authors = [
    { name = "PsiACE" }
]
requires-python = ">=3.12"
dependencies = [
    "github-copilot-sdk>=0.2.1,<0.3.0",
    "httpx>=0.28.1",
    "pydantic-settings>=2.13.1",
]

[project.entry-points.bub]
github-copilot = "bub_github_copilot.plugin"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"
